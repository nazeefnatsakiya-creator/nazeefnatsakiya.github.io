<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACHDP Election 2026 — City College</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap');
:root{
  --green:#1a5c2e;--gold:#b8971f;--dark:#0a1a0f;--cream:#f7f5f0;
  --border:#d4cdb8;--muted:#6b7c6b;--card:#fff;--green2:#2a7a42;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);font-family:'Inter',sans-serif;color:var(--dark);min-height:100vh;}

/* HEADER */
header{background:var(--dark);color:#fff;text-align:center;padding:20px 16px 16px;position:relative;}
header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--green),var(--gold),var(--green));}
.header-logos{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.logo-circle{width:62px;height:62px;border-radius:50%;overflow:hidden;border:2px solid var(--gold);background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.logo-circle img{width:100%;height:100%;object-fit:cover;}
.logo-school{width:72px;height:72px;border-width:3px;}
.header-divider{width:2px;height:40px;background:rgba(184,151,31,0.4);flex-shrink:0;}
.badge{display:inline-block;background:var(--gold);color:var(--dark);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:8px;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(17px,4vw,26px);font-weight:900;line-height:1.2;}
header h1 span{color:var(--gold);}
header p{font-size:12px;color:#8aaa8a;margin-top:4px;}

/* PROGRESS */
.progress-wrap{background:#112218;padding:10px 12px;overflow-x:auto;}
.progress-inner{display:flex;align-items:center;gap:0;min-width:max-content;margin:0 auto;}
.pdot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;background:#1e3a26;color:#5a8a6a;border:1.5px solid #1e3a26;transition:all .3s;flex-shrink:0;}
.pdot.active{background:var(--gold);color:var(--dark);border-color:var(--gold);}
.pdot.done{background:var(--green);color:#fff;border-color:var(--green);}
.pline{width:14px;height:2px;background:#1e3a26;transition:background .3s;flex-shrink:0;}
.pline.done{background:var(--green);}

/* MAIN */
main{max-width:600px;margin:0 auto;padding:20px 14px 60px;}
.page{display:none;}
.page.active{display:block;}

/* POSITION HEADER */
.pos-header{text-align:center;margin-bottom:18px;}
.pos-icon{width:48px;height:48px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 8px;box-shadow:0 4px 12px rgba(26,92,46,.25);}
.pos-header h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.pos-header .level-badge{display:inline-block;background:#e8f5ee;color:var(--green);font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;margin-top:4px;}

/* CANDIDATE CARDS */
.candidates{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.ccard{background:#fff;border:2px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;}
.ccard:hover{border-color:#8ab89a;background:#f8fdf9;}
.ccard.selected{border-color:var(--green);background:#e8f5ee;box-shadow:0 0 0 3px rgba(26,92,46,.1);}
.avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#1a5c2e,#2a7a42);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0;font-family:'Playfair Display',serif;}
.cinfo{flex:1;}
.cname{font-weight:600;font-size:14px;}
.cdept{font-size:11px;color:var(--muted);margin-top:2px;}
.ccheck{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:12px;}
.ccard.selected .ccheck{background:var(--green);border-color:var(--green);color:#fff;}

/* BUTTONS */
.btn-next{width:100%;background:var(--green);color:#fff;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-next:hover{background:#145228;}
.btn-next:disabled{background:#9dbfa8;cursor:not-allowed;}
.btn-back{width:100%;background:transparent;color:var(--muted);border:2px solid var(--border);border-radius:10px;padding:12px;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:8px;transition:all .2s;}
.btn-back:hover{border-color:#9dbfa8;color:var(--dark);}

/* REVIEW */
.rcard{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px;}
.rcard-head{background:var(--dark);color:#fff;padding:8px 14px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.rcard-body{padding:12px 14px;display:flex;align-items:center;gap:10px;}
.ravatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1a5c2e,#2a7a42);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;}
.rnotice{background:#fff8e0;border:1px solid #e8d060;border-radius:8px;padding:10px 12px;font-size:12px;color:#7a6010;margin-bottom:16px;}

/* SUCCESS */
.success-wrap{text-align:center;padding:24px 0;}
.success-icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--green),#2a7a42);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;box-shadow:0 8px 24px rgba(26,92,46,.3);animation:pop .5s cubic-bezier(.175,.885,.32,1.275);}
@keyframes pop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.success-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;margin-bottom:6px;}
.success-sub{font-size:13px;color:var(--muted);max-width:280px;margin:0 auto 24px;line-height:1.6;}
.vsummary{background:#fff;border-radius:12px;border:1px solid var(--border);padding:14px;text-align:left;margin-bottom:16px;}
.vsummary h4{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.vrow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0ede6;font-size:12px;}
.vrow:last-child{border-bottom:none;}
.vrow span:first-child{color:var(--muted);}
.vrow span:last-child{font-weight:600;}

/* LIVE RESULTS */
.results-btn{display:block;text-align:center;font-size:12px;color:var(--muted);cursor:pointer;margin-top:8px;text-decoration:underline;}
.live-banner{background:var(--dark);color:#fff;text-align:center;padding:10px;font-size:12px;font-weight:600;letter-spacing:1px;}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#4caf50;margin-right:6px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* RESULTS MODAL */
.rmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.rmodal.open{display:flex;}
.rbox{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:480px;margin:auto;}
.rbox h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:4px;}
.rbox p{font-size:12px;color:var(--muted);margin-bottom:14px;}
.rpos{margin-bottom:16px;}
.rpos h4{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.rbar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px;}
.rbar-name{width:140px;flex-shrink:0;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rbar-wrap{flex:1;background:#f0ede6;border-radius:4px;height:8px;overflow:hidden;}
.rbar-fill{height:100%;background:var(--green);border-radius:4px;transition:width .5s;}
.rbar-fill.lead{background:var(--gold);}
.rbar-count{font-size:11px;color:var(--muted);width:28px;text-align:right;}
.rbar-pct{font-size:11px;color:var(--muted);width:30px;}
.close-results{width:100%;background:var(--dark);color:#fff;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px;}
.total-badge{display:inline-flex;align-items:center;gap:5px;background:#e8f5ee;color:var(--green);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;margin-bottom:14px;}
.view-results-link{display:block;text-align:center;background:#e8f5ee;color:var(--green);border:1px solid #b8d8c4;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}

/* CONFETTI */
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
.cp{position:absolute;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>

}
function saveVotes(v){ localStorage.setItem('achdpVotes2026', JSON.stringify(v)); }

function buildProgress(){
  const wrap = document.getElementById('progressSteps');
  wrap.innerHTML = '';
  positions.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className='pdot'; d.id=`dot-${i}`; d.textContent=i+1;
    wrap.appendChild(d);
    if(i<positions.length-1){
      const l=document.createElement('div');
      l.className='pline'; l.id=`line-${i}`;
      wrap.appendChild(l);
    }
  });
}

function updateProgress(){
  positions.forEach((_,i)=>{
    const d=document.getElementById(`dot-${i}`);
    const l=document.getElementById(`line-${i}`);
    if(i<currentPage){d.className='pdot done';d.textContent='✓';}
    else if(i===currentPage){d.className='pdot active';d.textContent=i+1;}
    else{d.className='pdot';d.textContent=i+1;}
    if(l) l.className=i<currentPage?'pline done':'pline';
  });
}

function buildPages(){
  const main = document.getElementById('mainArea');
  main.innerHTML = '';

  // Voting pages
  positions.forEach((pos, pi)=>{
    const page = document.createElement('div');
    page.className = 'page' + (pi===0?' active':'');
    page.id = `page-${pi}`;

    let cardsHtml = candidates[pi].map((c,ci)=>`
      <div class="ccard" id="card-${pi}-${ci}" onclick="selectCandidate(${pi},${ci})">

        <div class="cinfo">
          <div class="cname">${c.name}</div>
          <div class="cdept">${c.dept}</div>
        </div>
        <div class="ccheck" id="check-${pi}-${ci}">✓</div>
      </div>`).join('');

    const isLast = pi === TOTAL_VOTE_PAGES - 1;
    const backBtn = pi > 0 ? `<button class="btn-back" onclick="prevPage(${pi})">← Back</button>` : '';

    page.innerHTML = `
      <div class="pos-header">
        <div class="pos-icon">${pos.icon}</div>
        <h2>${pos.title}</h2>
        <span class="level-badge">Candidates: ${pos.level}</span>

      <div class="candidates">${cardsHtml}</div>
      ${backBtn}
      <button class="btn-next" id="next-${pi}" onclick="nextPage(${pi})" disabled>

      </button>`;
    main.appendChild(page);
  });

  const reviewPage = document.createElement('div');
  reviewPage.className = 'page';
  reviewPage.id = `page-${TOTAL_VOTE_PAGES}`;

  main.appendChild(reviewPage);

  // Success page
  const successPage = document.createElement('div');
  successPage.className = 'page';
  successPage.id = `page-${TOTAL_VOTE_PAGES+1}`;
  successPage.innerHTML = `
    <div class="success-wrap">
      <div class="success-icon">✓</div>
      <h2 class="success-title">Vote Submitted!</h2>
      <p class="success-sub">Thank you for participating in the ACHDP Election 2026. Your vote has been recorded.</p>
      <div class="vsummary">
        <h4>Your Selections</h4>
        <div id="finalSummary"></div>
      </div>
      <div class="view-results-link" onclick="openResults()">
        <span class="live-dot"></span> View Live Results
      </div>
    </div>`;
  main.appendChild(successPage);
}

function selectCandidate(pi, ci){
  if(selections[pi]!==null){
    document.getElementById(`card-${pi}-${selections[pi]}`).classList.remove('selected');
  }
  selections[pi]=ci;
  document.getElementById(`card-${pi}-${ci}`).classList.add('selected');
  document.getElementById(`next-${pi}`).disabled=false;
  updateProgress();
}

function nextPage(from){
  document.getElementById(`page-${from}`).classList.remove('active');
  currentPage=from+1;
  if(currentPage===TOTAL_VOTE_PAGES) buildReview();
  document.getElementById(`page-${currentPage}`).classList.add('active');
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}

function prevPage(from){
  document.getElementById(`page-${from}`).classList.remove('active');
  currentPage=from-1;
  document.getElementById(`page-${currentPage}`).classList.add('active');
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildReview(){
  const c=document.getElementById('reviewCards');
  c.innerHTML='';
  positions.forEach((pos,i)=>{
    const cand=candidates[i][selections[i]];
    c.innerHTML+=`
      <div class="rcard">
        <div class="rcard-head">${pos.icon} ${pos.title}</div>
        <div class="rcard-body">
          <div class="ravatar">${cand.initials}</div>
          <div><div style="font-weight:600;font-size:13px">${cand.name}</div><div style="font-size:11px;color:var(--muted)">${cand.dept}</div></div>
          <div style="margin-left:auto;color:var(--green);font-size:16px">✓</div>
        </div>
      </div>`;
  });
}

function submitVote(){
  voteData=loadVotes();
  voteData.total++;
  positions.forEach((_,i)=>{ voteData.tallies[i][selections[i]]++; });
  saveVotes(voteData);

  const s=document.getElementById('finalSummary');
  s.innerHTML=positions.map((pos,i)=>`
    <div class="vrow"><span>${pos.title}</span><span>${candidates[i][selections[i]].name}</span></div>`).join('');

  document.getElementById(`page-${TOTAL_VOTE_PAGES}`).classList.remove('active');
  document.getElementById(`page-${TOTAL_VOTE_PAGES+1}`).classList.add('active');
  currentPage=TOTAL_VOTE_PAGES+1;
  window.scrollTo({top:0,behavior:'smooth'});
  launchConfetti();
}

// ============================================================
// LIVE RESULTS
// ============================================================
let resultsInterval=null;
function openResults(){
  document.getElementById('resultsModal').classList.add('open');
  renderResults();
  resultsInterval=setInterval(()=>{
    voteData=loadVotes();
    renderResults();
  },3000);
}
function closeResults(){
  document.getElementById('resultsModal').classList.remove('open');
  if(resultsInterval) clearInterval(resultsInterval);
}

function renderResults(){
  const c=document.getElementById('resultsContent');
  const total=voteData.total;
  document.getElementById('totalCount').textContent=total;
  c.innerHTML='';
  positions.forEach((pos,pi)=>{
    const tallies=voteData.tallies[pi];
    const maxV=Math.max(...tallies,1);
    const leadIdx=tallies.indexOf(Math.max(...tallies));
    let html=`<div class="rpos"><h4>${pos.icon} ${pos.title}</h4>`;
    candidates[pi].forEach((cand,ci)=>{
      const pct=total>0?Math.round((tallies[ci]/total)*100):0;
      const isLead=ci===leadIdx&&tallies[ci]>0;
      const barW=total>0?Math.round((tallies[ci]/maxV)*100):0;
      html+=`<div class="rbar-row">
        <div class="rbar-name" title="${cand.name}">${cand.name.split(' ')[0]} ${cand.name.split(' ')[1]||''}</div>
        <div class="rbar-wrap"><div class="rbar-fill ${isLead?'lead':''}" style="width:${barW}%"></div></div>
        <div class="rbar-count">${tallies[ci]}</div>
        <div class="rbar-pct">${pct}%</div>
      </div>`;
    });
    html+='</div>';
    c.innerHTML+=html;
  });
}

// ============================================================
// CONFETTI
// ============================================================
function launchConfetti(){
  const cont=document.getElementById('confetti');
  const colors=['#1a5c2e','#b8971f','#fff','#2a7a42','#e8d060','#4aaa6e'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');
    p.className='cp';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.6}s;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;`;
    cont.appendChild(p);
    setTimeout(()=>p.remove(),4000);
  }
}

// ============================================================
// INIT
// ============================================================
buildProgress();
buildPages();
updateProgress();

// Floating results button visible always
const fab=document.createElement('div');
fab.style.cssText='position:fixed;bottom:20px;right:16px;z-index:100;background:var(--green);color:#fff;border-radius:50px;padding:10px 16px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;gap:6px;';
fab.innerHTML='<span class="live-dot" style="background:#fff"></span> Live Results';
fab.onclick=openResults;
document.body.appendChild(fab);
</script>
</body>
</html>
